services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    restart: always
    depends_on:
      - mongodb
    env_file:
      - /home/ubuntu/env/backend.env
    environment:
      - SIGN2SPEECH_FASTAPI_BASE_URL=${SIGN2SPEECH_FASTAPI_BASE_URL}
      - MONGODB_URI=${MONGODB_URI}

  mongodb:
    image: mongo:7
    container_name: backend-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_DATABASE}
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data: